

spring.application.name=PRODUCT-SERVICE

server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.config.import=optional:configserver:http://localhost:8888
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

management.endpoints.web.exposure.include=*

# ✅ Kafka Config (Consumer)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=product-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ✅ IMPORTANT FIX (ADD THIS)
spring.kafka.consumer.properties.spring.json.value.default.type=com.wipro.productservice.dto.OrderEvent

spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.ack-mode=record


spring.kafka.consumer.session-timeout-ms=15000
spring.kafka.consumer.heartbeat-interval=5000
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# ✅ ZIPKIN
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


# ✅ PROMETHEUS / GRAFANA
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true