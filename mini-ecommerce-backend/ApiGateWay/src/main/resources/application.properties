spring.application.name=API-GATEWAY

spring.config.import=optional:configserver:http://localhost:8888

server.port=9999

# ======================
# EUREKA CONFIG
# ======================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.main.web-application-type=reactive

# ======================
# GATEWAY ROUTES
# ======================

# USERMS-W
spring.cloud.gateway.routes[0].id=userms-w
spring.cloud.gateway.routes[0].uri=lb://USERMS-W
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-w,/user-w/**

# USERMS-R
spring.cloud.gateway.routes[1].id=userms-r
spring.cloud.gateway.routes[1].uri=lb://USERMS-R
spring.cloud.gateway.routes[1].predicates[0]=Path=/user-r,/user-r/**

# PRODUCT SERVICE
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/product,/product/**

# PRODUCT SERVICE + CIRCUIT BREAKER (FIXED ✅)
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=productService
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/product


# ORDER SERVICE
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/order,/order/**

# ORDER SERVICE + CIRCUIT BREAKER (FIXED ✅)
spring.cloud.gateway.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[0].args.name=orderService
spring.cloud.gateway.routes[3].filters[0].args.fallbackUri=forward:/fallback/order


# CART SERVICE
spring.cloud.gateway.routes[4].id=cart-service
spring.cloud.gateway.routes[4].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/cart,/cart/**

# ======================
# TIMEOUT (IMPORTANT)
# ======================
spring.cloud.gateway.httpclient.connect-timeout=2000
spring.cloud.gateway.httpclient.response-timeout=5s

# ======================
# ZIPKIN
# ======================
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# ======================
# ACTUATOR
# ======================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ======================
# PROMETHEUS / GRAFANA
# ======================
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true