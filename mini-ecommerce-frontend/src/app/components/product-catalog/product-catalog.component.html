<div class="container mt-4" *ngIf="product">
  <div class="row g-4">
    <div class="col-12 col-md-5">
      <img [src]="product.imageUrl" class="img-fluid rounded-4 shadow-sm w-100" alt="product" style="max-height: 500px; object-fit: contain; background: #fff;">
    </div>

    <div class="col-12 col-md-7">
      <div class="ps-md-4">
        <nav aria-label="breadcrumb" class="mb-2">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item text-primary small fw-bold text-uppercase tracking-wider">{{ product.brand || 'BRAND' }}</li>
            <li class="breadcrumb-item active small fw-bold text-uppercase tracking-wider" aria-current="page">{{ product.category }}</li>
          </ol>
        </nav>
        
        <h1 class="fw-bolder text-dark mb-3 display-6">{{ product.name }}</h1>
        
        <p class="text-muted fs-5 mb-4">{{ product.description }}</p>
        
        <div class="d-flex align-items-center mb-4">
          <h2 class="text-primary fw-bolder mb-0 me-3">₹{{ product.price | number:'1.0-0' }}</h2>
          <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-2 py-1" *ngIf="product.quantity > 0">In Stock</span>
          <span class="badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 px-2 py-1" *ngIf="product.quantity === 0">Out of Stock</span>
        </div>

        <div class="mb-4 d-flex align-items-center gap-3">
          <div class="quantity-control d-flex align-items-center border rounded-pill p-1 bg-light" style="width: fit-content;">
            <button class="btn btn-sm btn-light rounded-circle border-0" (click)="quantity = quantity > 1 ? quantity - 1 : 1"><i class="bi bi-dash"></i></button>
            <input type="number" class="form-control border-0 bg-transparent text-center fw-bold shadow-none p-0" style="width: 50px;" min="1" [(ngModel)]="quantity">
            <button class="btn btn-sm btn-light rounded-circle border-0" (click)="quantity = quantity + 1"><i class="bi bi-plus"></i></button>
          </div>
          <span class="text-muted small fw-medium">{{ product.quantity }} units left</span>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-3 mb-4">
          <button class="btn btn-primary-custom flex-grow-1 rounded-pill py-3 fw-bold shadow-sm" (click)="addToCart()" [disabled]="product.quantity === 0">
            <i class="bi bi-cart3 me-2"></i> Add to Cart
          </button>
          <button class="btn btn-outline-danger px-4 rounded-pill py-3 fw-bold">
            <i class="bi bi-heart me-2"></i> Wishlist
          </button>
        </div>

        <p class="text-success fw-bold d-flex align-items-center" *ngIf="message">
          <i class="bi bi-check-circle-fill me-2"></i> {{ message }}
        </p>
      </div>
    </div>
  </div>
</div>
