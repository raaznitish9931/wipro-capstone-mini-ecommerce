<app-navbar></app-navbar>

<div class="container py-2 pb-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden position-relative mt-4">
        <div class="card-header border-0 text-white text-center py-4 bg-primary text-gradient-bg">
          <i class="bi bi-person-circle display-1 mb-2 d-inline-block"></i>
          <h3 class="fw-bold mb-0">{{ user?.name || 'User Profile' }}</h3>
          <p class="text-white-50 mb-0">{{ user?.role?.toUpperCase() === 'ADMIN' ? 'Administrator' : 'Customer' }}</p>
        </div>

        <div class="card-body p-4 p-md-5">
          <div class="mb-3">
            <label class="form-label text-muted fw-bold small">Full Name</label>
            <input type="text" class="form-control" [readOnly]="!isEditMode" [(ngModel)]="user!.name" [ngClass]="{'bg-light border-0 shadow-none': !isEditMode}">
          </div>

          <div class="mb-3">
            <label class="form-label text-muted fw-bold small">Email Address</label>
            <input type="email" class="form-control" [readOnly]="true" [ngModel]="user!.email" class="form-control bg-light border-0 shadow-none text-muted">
            <small class="text-muted" *ngIf="isEditMode">Email cannot be changed.</small>
          </div>

          <!-- Password Fields (Only in Edit Mode) -->
          <div *ngIf="isEditMode" class="card bg-light border-0 p-3 mb-4 rounded-3 shadow-sm">
            <h6 class="fw-bold text-dark mb-3">Change Password</h6>
            <div class="mb-3">
              <label class="form-label text-muted fw-bold small">Old Password</label>
              <input type="password" class="form-control" [(ngModel)]="oldPasswordText" placeholder="Enter your current password">
            </div>
            <div>
              <label class="form-label text-muted fw-bold small">New Password</label>
              <input type="password" class="form-control" [(ngModel)]="newPasswordText" placeholder="Create a new password">
            </div>
          </div>

          <!-- Phone Number Field -->
          <div class="mb-3">
            <label class="form-label text-muted fw-bold small">Phone Number</label>
            <input type="tel" class="form-control" [readOnly]="!isEditMode" [(ngModel)]="user!.phone" [ngClass]="{'bg-light border-0 shadow-none': !isEditMode}" placeholder="Eg: 9876543210" pattern="^[0-9]{10}$">
          </div>

          <!-- Address Field -->
          <div class="mb-4">
            <label class="form-label text-muted fw-bold small">Address</label>
            <textarea class="form-control" rows="3" [readOnly]="!isEditMode" [(ngModel)]="user!.address" [ngClass]="{'bg-light border-0 shadow-none': !isEditMode}" placeholder="Enter your full address..."></textarea>
          </div>

          <div class="d-flex justify-content-between gap-3 mt-4">
            <button class="btn btn-light w-100 fw-semibold rounded-pill" *ngIf="!isEditMode" (click)="goBack()">Go Back</button>
            <button class="btn btn-light w-50 fw-semibold rounded-pill" *ngIf="isEditMode" (click)="goBack()">Cancel</button>
            <button *ngIf="isEditMode" class="btn btn-success w-50 fw-semibold rounded-pill" (click)="saveProfile()">Save Changes</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
