<nav class="navbar navbar-expand-lg custom-navbar shadow-sm sticky-top w-100 py-1 py-lg-0" style="z-index: 1040; top: 0;">
  <div class="container-fluid px-3 px-lg-4 d-flex align-items-center justify-content-between" style="min-height: 70px;">
    <a class="d-flex align-items-center text-decoration-none" [routerLink]="userRole === 'Admin' ? '/admin-dashboard' : '/user-dashboard'">
      <div class="bg-white rounded p-1 me-2 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
        <i class="bi bi-shield-lock-fill text-dark" *ngIf="userRole === 'Admin'"></i>
        <i class="bi bi-person-badge text-dark" *ngIf="userRole !== 'Admin'"></i>
      </div>
      <span class="navbar-brand fw-bold text-white mb-0" style="cursor: pointer; font-size: 1.15rem;">{{ userRole === 'Admin' ? 'Admin Portal' : 'Storefront' }}</span>
    </a>

    <button class="navbar-toggler border-0 text-white shadow-none p-2" type="button" 
            (click)="isNavbarCollapsed = !isNavbarCollapsed" aria-label="Toggle navigation">
      <i class="bi" [ngClass]="isNavbarCollapsed ? 'bi-list fs-1' : 'bi-x-lg fs-2'"></i>
    </button>

    <div class="collapse navbar-collapse" [ngClass]="{'show': !isNavbarCollapsed}">
      <div class="ms-auto d-flex flex-column flex-lg-row align-items-stretch align-items-lg-center gap-2 gap-lg-3 py-3 py-lg-0">
        <a *ngIf="userRole !== 'Admin'" routerLink="/cart" (click)="isNavbarCollapsed = true" class="nav-link text-white fw-medium d-flex align-items-center position-relative width-fit-content">
          <i class="bi bi-cart3 fs-5 me-2"></i> Cart
          <span class="ms-2 badge rounded-pill bg-danger shadow-sm border border-light d-lg-none" *ngIf="cartCount > 0">
            {{ cartCount }}
          </span>
          <span class="position-absolute translate-middle badge rounded-pill bg-danger shadow-sm border border-light d-none d-lg-block"
                *ngIf="cartCount > 0" style="top: 5px; right: -5px; font-size: 0.65rem; padding: 0.25em 0.5em;">
            {{ cartCount }}
          </span>
        </a>
        
        <a [routerLink]="userRole === 'Admin' ? '/admin-dashboard' : '/user-dashboard'" (click)="isNavbarCollapsed = true" class="nav-link text-white fw-medium"><i class="bi bi-house me-1"></i> Home</a>
        
        <div class="dropdown position-relative">
          <button class="btn btn-outline-light rounded-pill px-4 py-2 fw-semibold border d-flex align-items-center w-100 w-lg-auto" type="button" (click)="toggleDropdown()">
            <i class="bi bi-person-circle me-2 fs-5"></i> 
            <span class="text-truncate">{{ user?.name || userRole }}</span>
            <i class="bi bi-chevron-down ms-auto ms-lg-2 small"></i>
          </button>
          
          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2 rounded-3 w-100 w-lg-auto" 
              [ngClass]="{'show': isDropdownOpen}" 
              [ngStyle]="{'display': isDropdownOpen ? 'block' : 'none', 'right': '0' , 'z-index': '1050'}">
            
            <li><a class="dropdown-item py-2 fw-medium" routerLink="/profile" (click)="toggleDropdown(); isNavbarCollapsed = true"><i class="bi bi-person-badge me-2 text-secondary"></i> View Profile</a></li>
            <li><a class="dropdown-item py-2 fw-medium" routerLink="/profile" [queryParams]="{edit: 'true'}" (click)="toggleDropdown(); isNavbarCollapsed = true"><i class="bi bi-pencil-square me-2 text-secondary"></i> Edit Profile</a></li>
            <li><a class="dropdown-item py-2 fw-medium" routerLink="/wishlist" (click)="toggleDropdown(); isNavbarCollapsed = true"><i class="bi bi-heart-fill me-2 text-danger"></i> Wishlist</a></li>
            
            <li *ngIf="userRole === 'Admin'"><a class="dropdown-item py-2 fw-medium" routerLink="/admin-dashboard" (click)="toggleDropdown(); isNavbarCollapsed = true"><i class="bi bi-grid me-2 text-secondary"></i> Manage Products</a></li>
            <li *ngIf="userRole === 'User'"><a class="dropdown-item py-2 fw-medium" routerLink="/my-orders" (click)="toggleDropdown(); isNavbarCollapsed = true"><i class="bi bi-box-seam me-2 text-secondary"></i> Orders</a></li>
            
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item py-2 fw-bold text-danger" href="javascript:void(0)" (click)="toggleDropdown(); isNavbarCollapsed = true; logout()"><i class="bi bi-box-arrow-right me-2 text-danger"></i> Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>
