<nav class="navbar navbar-expand-lg px-4 custom-navbar shadow-sm d-flex align-items-center w-100 sticky-top" style="min-height: 10vh; max-height: 10vh; z-index: 1030; top: 0;">
  <a class="d-flex align-items-center text-decoration-none" [routerLink]="userRole === 'Admin' ? '/admin-dashboard' : '/user-dashboard'">
    <div class="bg-white rounded p-1 me-2 d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
      <i class="bi bi-shield-lock-fill text-dark" *ngIf="userRole === 'Admin'"></i>
      <i class="bi bi-person-badge text-dark" *ngIf="userRole !== 'Admin'"></i>
    </div>
    <span class="navbar-brand fw-bold text-white mb-0" style="cursor: pointer;">{{ userRole === 'Admin' ? 'Admin Portal' : 'Storefront' }}</span>
  </a>

  <div class="ms-auto d-flex align-items-center gap-3">
    <a *ngIf="userRole !== 'Admin'" routerLink="/cart" class="text-white fw-medium text-decoration-none me-3 position-relative d-flex align-items-center">
      <i class="bi bi-cart3 fs-5 me-1"></i> Cart
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow-sm border border-light"
            *ngIf="cartCount > 0" style="font-size: 0.65rem; padding: 0.25em 0.5em;">
        {{ cartCount }}
      </span>
    </a>
    
    <a [routerLink]="userRole === 'Admin' ? '/admin-dashboard' : '/user-dashboard'" class="text-white fw-medium text-decoration-none me-2"><i class="bi bi-house me-1"></i> Home</a>
    
    <div class="dropdown position-relative">
      <button class="btn btn-outline-light rounded-pill px-4 py-2 fw-semibold border d-flex align-items-center" type="button" (click)="toggleDropdown()">
        <i class="bi bi-person-circle me-2 fs-5"></i> 
        <span>{{ userRole }}</span>
        <i class="bi bi-chevron-down ms-2 small"></i>
      </button>
      
      <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2 rounded-3" 
          [ngClass]="{'show': isDropdownOpen}" 
          [ngStyle]="{'display': isDropdownOpen ? 'block' : 'none', 'position': 'absolute', 'right': '0', 'z-index': '1050'}">
        
        <li><a class="dropdown-item py-2 fw-medium" routerLink="/profile" (click)="toggleDropdown()"><i class="bi bi-person-badge me-2 text-secondary"></i> View Profile</a></li>
        <li><a class="dropdown-item py-2 fw-medium" routerLink="/profile" [queryParams]="{edit: 'true'}" (click)="toggleDropdown()"><i class="bi bi-pencil-square me-2 text-secondary"></i> Edit Profile</a></li>
        <li><a class="dropdown-item py-2 fw-medium" routerLink="/wishlist" (click)="toggleDropdown()"><i class="bi bi-heart-fill me-2 text-danger"></i> Wishlist</a></li>
        
        <li *ngIf="userRole === 'Admin'"><a class="dropdown-item py-2 fw-medium" routerLink="/admin-dashboard" (click)="toggleDropdown()"><i class="bi bi-grid me-2 text-secondary"></i> Manage Products</a></li>
        <li *ngIf="userRole === 'User'"><a class="dropdown-item py-2 fw-medium" routerLink="/my-orders" (click)="toggleDropdown()"><i class="bi bi-box-seam me-2 text-secondary"></i> Orders</a></li>
        
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item py-2 fw-bold text-danger" href="javascript:void(0)" (click)="toggleDropdown(); logout()"><i class="bi bi-box-arrow-right me-2 text-danger"></i> Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
